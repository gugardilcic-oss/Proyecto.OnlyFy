## Application properties for message-service
## Common
spring.application.name=message-service
server.port=8087

## JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

## Development datasource (H2 in-memory) - default for local dev/tests
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

## Production datasource (MySQL) - example values (commented).
## To use MySQL, replace the H2 settings above or set these via environment variables
## and set `spring.jpa.hibernate.ddl-auto=validate` (recommended in prod).
# spring.datasource.url=jdbc:mysql://localhost:3306/message_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=${DB_USER:root}
# spring.datasource.password=${DB_PASSWORD:changeit}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto=validate

## Logging
logging.level.org.springframework=INFO
logging.level.com.onlyfy=DEBUG


